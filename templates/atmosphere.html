<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Prediction</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* General Styling */
        body {
            font-family: 'Poppins', sans-serif;
            background: url('{{ url_for("static", filename="atmosphere-bg.jpg") }}') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Left Container Styling with Blur Effect */
        .left-container {
            width: 40%;
            max-height: 85vh;
            background: rgba(255, 255, 255, 0.2); /* Semi-transparent white */
            backdrop-filter: blur(10px); /* Blur effect */
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            padding: 40px;
            overflow-y: auto;
            transform: perspective(1000px) rotateX(-10deg) scale(1.05);
            transition: all 0.5s ease;
            border: 1px solid rgba(255, 255, 255, 0.3); /* Subtle border */
            animation: float 4s ease-in-out infinite;
        }

        .left-container:hover {
            transform: perspective(1000px) rotateX(0) scale(1.07);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
        }

        /* Right Container Styling with Blur Effect */
        .right-container {
            width: 40%;
            max-height: 85vh;
            background: rgba(255, 255, 255, 0.2); /* Semi-transparent white */
            backdrop-filter: blur(10px); /* Blur effect */
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            padding: 40px;
            overflow-y: auto;
            display: none; /* Initially hidden */
            border: 1px solid rgba(255, 255, 255, 0.3); /* Subtle border */
            animation: float 4s ease-in-out infinite;
        }

        /* Floating Animation */
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* Black Box with White Text */
        .black-box {
            background-color: rgba(0, 0, 0, 0.8); /* Semi-transparent black */
            color: white; /* White text */
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 1s ease-in-out;
        }

        /* Heading Styling */
        h2 {
            font-size: 28px;
            margin: 0;
        }

        /* Input Styling */
        input {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: 2px solid rgba(255, 255, 255, 0.5); /* Lighter border */
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            background: rgba(255, 255, 255, 0.3); /* Semi-transparent background */
            color: #333;
            animation: slideIn 0.5s ease-in-out;
        }

        input:focus {
            border-color: rgba(0, 0, 0, 0.7); /* Darker border on focus */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        input::placeholder {
            color: rgba(0, 0, 0, 0.6); /* Darker placeholder */
        }

        /* Button Styling */
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #4B0082, #8A2BE2); /* Dark Violet Gradient */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            animation: fadeIn 1s ease-in-out;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(75, 0, 130, 0.3); /* Dark Violet Shadow */
        }

        /* Result Section */
        #atmosphere_result {
            margin-top: 20px;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        #atmosphere_result img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
            animation: zoomIn 0.5s ease-in-out;
        }

        /* Fade In Animation */
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        /* Slide In Animation */
        @keyframes slideIn {
            0% {
                transform: translateX(-100%);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Zoom In Animation */
        @keyframes zoomIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Scroll Down Button */
        .scroll-down-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(45deg, #4B0082, #8A2BE2);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scroll-down-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(75, 0, 130, 0.3);
        }
    </style>
</head>
<body>

<div class="left-container">
    <div class="black-box">
        <h2>Atmosphere-based Crop Prediction</h2>
    </div>
    
    <input type="number" id="temperature" placeholder="🌡️ Temperature" required>
    <input type="number" id="humidity" placeholder="💧 Humidity" required>
    <input type="number" step="0.1" id="ph" placeholder="🧪 pH Level" required>
    <input type="number" id="nitrogen" placeholder="🌱 Nitrogen" required>
    <input type="number" id="phosphorus" placeholder="🌾 Phosphorus" required>
    <input type="number" id="potassium" placeholder="🧂 Potassium" required>
    <input type="number" id="rainfall" placeholder="☔ Rainfall (mm)" required>

    <button onclick="predictAtmosphere()">Predict Crop</button>
</div>

<div class="right-container" id="right-container">
    <div class="black-box">
        <h2>Prediction Result</h2>
    </div>
    <div id="atmosphere_result"></div>
</div>

<!-- Scroll Down Button -->
<button class="scroll-down-btn" onclick="scrollDown()">↓</button>

<script>
function predictAtmosphere() {
    const data = {
        temperature: document.getElementById("temperature").value,
        humidity: document.getElementById("humidity").value,
        ph: document.getElementById("ph").value,
        nitrogen: document.getElementById("nitrogen").value,
        phosphorus: document.getElementById("phosphorus").value,
        potassium: document.getElementById("potassium").value,
        rainfall: document.getElementById("rainfall").value
    };

    fetch("/predict/atmosphere", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("atmosphere_result").innerHTML = `
            <h3>Recommended Crop: <span style="color:#4B0082;">${data.crop}</span></h3>
            <img src="data:image/png;base64,${data.chart}" />
        `;
        document.getElementById("right-container").style.display = 'block';
    })
    .catch(error => console.error("Error:", error));
}

function scrollDown() {
    window.scrollBy({
        top: window.innerHeight,
        behavior: 'smooth'
    });
}
</script>

</body>
</html>
